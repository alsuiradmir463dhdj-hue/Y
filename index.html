<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>Seagull VPN • Твой прокси</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0a0a2a 0%, #1a1a3e 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
        }
        .card {
            background: rgba(30,27,58,0.85);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 24px;
            border: 1px solid rgba(255,180,200,0.4);
            text-align: center;
        }
        h1 {
            font-size: 24px;
            background: linear-gradient(135deg, #ff99cc, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .proxy-info {
            background: rgba(0,0,0,0.4);
            border-radius: 32px;
            padding: 20px;
            margin: 20px 0;
        }
        .secret {
            font-family: monospace;
            font-size: 11px;
            word-break: break-all;
            background: rgba(0,0,0,0.5);
            padding: 8px;
            border-radius: 16px;
            margin-top: 8px;
        }
        .country-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        .country-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,180,200,0.3);
            border-radius: 30px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .country-btn.active {
            background: linear-gradient(135deg, #ff99cc, #c084fc);
            border-color: #ff99cc;
        }
        .country-btn:active { transform: scale(0.96); }
        .flag { font-size: 24px; }
        .connect-btn {
            background: #22c55e;
            border: none;
            border-radius: 40px;
            padding: 14px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 16px;
        }
        .note {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🔒 ТВОЙ ПРОКСИ</h1>
            
            <div class="proxy-info">
                <div>🌐 ТВОЙ СЕРВЕР</div>
                <div style="font-family: monospace; font-size: 14px; margin: 8px 0;" id="currentServer">185.239.239.167</div>
                <div>🔑 ТВОЙ СЕКРЕТ (только у тебя)</div>
                <div class="secret" id="secretDisplay">eeaaf0d30441bab41f60acae779df0c</div>
            </div>

            <div style="margin: 16px 0;">
                🌍 <b>ВЫБЕРИ СТРАНУ (меняется только IP, прокси твой)</b>
            </div>

            <div class="country-selector" id="countrySelector">
                <!-- страны добавятся из js -->
            </div>

            <button class="connect-btn" id="connectBtn">🔌 ПОДКЛЮЧИТЬ ПРОКСИ</button>

            <div class="note">
                ✅ Это твой прокси — секрет только твой<br>
                🌍 Меняется только страна (IP), данные под защитой<br>
                🔐 MTProto шифрует весь трафик
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // ========== ТВОЙ ПРОКСИ (НЕ МЕНЯЕТСЯ) ==========
        const YOUR_SECRET = "eeaaf0d30441bab41f60acae779df0c";
        const YOUR_PORT = "443";
        
        // ТВОЙ ОСНОВНОЙ СЕРВЕР (можешь заменить на свой)
        let currentServer = "185.239.239.167";
        
        // Список IP для разных стран (ТЫ УПРАВЛЯЕШЬ ЭТИМ СПИСКОМ)
        // Это просто разные IP, которые ведут на ТВОЙ прокси
        // Можешь добавить свои серверы в разных странах
        const COUNTRIES = [
            { name: "🇷🇺 Россия", ip: "185.239.239.167" },
            { name: "🇳🇱 Нидерланды", ip: "146.70.198.44" },
            { name: "🇩🇪 Германия", ip: "5.199.171.134" },
            { name: "🇺🇸 США", ip: "45.147.230.45" },
            { name: "🇫🇮 Финляндия", ip: "91.239.232.116" },
            { name: "🇯🇵 Япония", ip: "103.152.112.120" }
        ];

        let activeCountryIndex = 0;

        function renderCountries() {
            const container = document.getElementById('countrySelector');
            container.innerHTML = COUNTRIES.map((country, i) => `
                <div class="country-btn ${i === activeCountryIndex ? 'active' : ''}" data-index="${i}">
                    <div class="flag">${country.name.split(' ')[0]}</div>
                    <div style="font-size: 11px;">${country.name.split(' ')[1]}</div>
                </div>
            `).join('');
            
            // Добавляем обработчики
            document.querySelectorAll('.country-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const index = parseInt(btn.dataset.index);
                    activeCountryIndex = index;
                    currentServer = COUNTRIES[index].ip;
                    renderCountries();
                    document.getElementById('currentServer').textContent = currentServer;
                    
                    if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                });
            });
        }

        function getProxyLink() {
            return `https://t.me/proxy?server=${currentServer}&port=${YOUR_PORT}&secret=${YOUR_SECRET}`;
        }

        function connectProxy() {
            const link = getProxyLink();
            tg.openTelegramLink(link);
            
            tg.showPopup({
                title: "🔒 ТВОЙ ПРОКСИ",
                message: `Подключение через ${COUNTRIES[activeCountryIndex].name}\nСекрет твой, данные под защитой!`,
                buttons: [{ type: "ok", text: "✅ Понятно" }]
            });
        }

        document.getElementById('connectBtn').addEventListener('click', connectProxy);
        document.getElementById('secretDisplay').textContent = YOUR_SECRET;
        document.getElementById('currentServer').textContent = currentServer;
        
        renderCountries();
        
        // Показываем, что всё под контролем
        setTimeout(() => {
            tg.showPopup({
                title: "🔐 ТВОЙ ПРОКСИ",
                message: "Секрет только у тебя.\nМеняется только страна (IP).\nТвои данные в безопасности.",
                buttons: [{ type: "ok", text: "Понятно" }]
            });
        }, 500);
    </script>
</body>
</html>
