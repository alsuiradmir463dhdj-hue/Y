<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>VPN • Канал</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0a0a2a 0%, #1a1a3e 100%);
            font-family: system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 360px;
            width: 100%;
        }
        .card {
            background: rgba(30,27,58,0.85);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 32px 24px;
            text-align: center;
            border: 1px solid rgba(255,180,200,0.4);
        }
        .channel-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 24px;
            background: linear-gradient(135deg, #ff99cc, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
        }
        .sub-btn {
            background: linear-gradient(135deg, #ff99cc, #c084fc);
            border: none;
            border-radius: 40px;
            padding: 14px;
            color: white;
            font-weight: bold;
            width: 100%;
            margin: 10px 0;
            cursor: pointer;
        }
        .connect-btn {
            background: #22c55e;
            border: none;
            border-radius: 40px;
            padding: 14px;
            color: white;
            font-weight: bold;
            width: 100%;
            margin: 10px 0;
            cursor: pointer;
        }
        .connect-btn.disabled {
            background: #555;
            cursor: not-allowed;
        }
        .status {
            font-size: 12px;
            color: #ffd700;
            margin-top: 16px;
        }
        .note {
            font-size: 10px;
            color: rgba(255,255,255,0.4);
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="channel-icon">📢</div>
            <h1>VPN PROXY</h1>
            
            <div id="subPanel">
                <button class="sub-btn" id="subBtn">⭐ ПОДПИСАТЬСЯ НА КАНАЛ</button>
                <div class="note">Подпишись, чтобы получить доступ к прокси</div>
            </div>

            <div id="proxyPanel" style="display: none;">
                <button class="connect-btn" id="connectBtn">🔌 ПОДКЛЮЧИТЬ ПРОКСИ</button>
                <div class="status" id="statusText">✅ Подписка подтверждена!</div>
            </div>

            <div class="note">
                Канал будет вверху после подписки
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // ТВОЙ КАНАЛ
        const CHANNEL_LINK = "https://t.me/ваш_канал";
        
        // ТВОЙ ПРОКСИ
        const PROXY_LINK = "https://t.me/proxy?server=185.239.239.167&port=443&secret=eeaaf0d30441bab41f60acae779df0c";

        let isSubscribed = false;

        function checkSubscription() {
            // Проверяем, подписался ли пользователь
            const saved = localStorage.getItem('subscribed_to_channel');
            if (saved === 'true') {
                isSubscribed = true;
                document.getElementById('subPanel').style.display = 'none';
                document.getElementById('proxyPanel').style.display = 'block';
            }
        }

        function subscribe() {
            tg.openTelegramLink(CHANNEL_LINK);
            tg.showPopup({
                title: "📢 Подпишись",
                message: "После подписки нажми 'Проверить'",
                buttons: [
                    { id: "check", type: "ok", text: "✅ ПРОВЕРИТЬ" }
                ]
            }, (buttonId) => {
                if (buttonId === "check") {
                    localStorage.setItem('subscribed_to_channel', 'true');
                    isSubscribed = true;
                    document.getElementById('subPanel').style.display = 'none';
                    document.getElementById('proxyPanel').style.display = 'block';
                    tg.showPopup({
                        title: "✅ Готово!",
                        message: "Теперь ты можешь подключить прокси!",
                        buttons: [{ type: "ok", text: "Ок" }]
                    });
                }
            });
        }

        function connectProxy() {
            if (!isSubscribed) {
                tg.showPopup({
                    title: "❌",
                    message: "Сначала подпишись на канал!",
                    buttons: [{ type: "ok", text: "Ок" }]
                });
                return;
            }
            tg.openTelegramLink(PROXY_LINK);
        }

        document.getElementById('subBtn').addEventListener('click', subscribe);
        document.getElementById('connectBtn').addEventListener('click', connectProxy);

        checkSubscription();
    </script>
</body>
</html>
