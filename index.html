<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>Seagull VPN</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a2a 0%, #1a1a3e 50%, #2a1a4a 100%);
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Звёзды */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Чайки */
        .seagull {
            position: absolute;
            font-size: 32px;
            pointer-events: none;
            z-index: 10;
            animation: fly 12s linear infinite;
            filter: drop-shadow(0 0 8px rgba(255,255,200,0.8));
        }

        @keyframes fly {
            0% {
                transform: translateX(-10vw) translateY(0) rotate(-10deg);
                opacity: 0;
            }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% {
                transform: translateX(110vw) translateY(-50px) rotate(10deg);
                opacity: 0;
            }
        }

        /* Рыбки */
        .fish {
            position: absolute;
            font-size: 28px;
            pointer-events: none;
            z-index: 10;
            animation: swim 8s ease-in-out infinite;
        }

        @keyframes swim {
            0% {
                transform: translateX(-10vw) translateY(0) rotate(0deg);
                opacity: 0;
            }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% {
                transform: translateX(110vw) translateY(20px) rotate(5deg);
                opacity: 0;
            }
        }

        /* Аниме-персонажи */
        .character {
            position: absolute;
            font-size: 45px;
            pointer-events: none;
            z-index: 10;
            animation: float 4s ease-in-out infinite;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        .chika { bottom: 15px; left: 5px; animation-duration: 3s; }
        .nezuko { bottom: 50px; right: 5px; animation-duration: 4s; }
        .totoro { top: 70px; left: 5px; font-size: 55px; animation-duration: 5s; }
        .zenitsu { top: 45px; right: 5px; animation-duration: 3.5s; }
        .pikachu { bottom: 90px; left: 45%; transform: translateX(-50%); animation-duration: 4.5s; }
        .jellyfish { top: 30%; right: 15%; font-size: 35px; animation-duration: 6s; animation: float 5s ease-in-out infinite; }
        .butterfly { top: 20%; left: 10%; font-size: 32px; animation-duration: 7s; }

        @media (max-width: 600px) {
            .character { font-size: 35px; }
            .totoro { font-size: 45px; top: 60px; }
        }

        .container {
            max-width: 380px;
            width: 100%;
            margin: 0 auto;
            position: relative;
            z-index: 20;
        }

        .card {
            background: rgba(30, 27, 58, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 28px 22px;
            text-align: center;
            border: 1px solid rgba(255, 180, 200, 0.4);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4);
        }

        .anime-icon {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #ff99cc, #c084fc, #a855f7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 48px;
            animation: floatIcon 3s ease-in-out infinite, glow 2s infinite;
        }

        @keyframes floatIcon {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 10px rgba(255, 153, 204, 0.5); }
            50% { box-shadow: 0 0 25px rgba(192, 132, 252, 0.9); }
        }

        h1 {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff99cc, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }

        .sub {
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            margin-bottom: 20px;
        }

        .status-area {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 16px;
            margin: 16px 0;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status-row:last-child {
            border-bottom: none;
        }

        .status-label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
        }

        .status-value {
            font-family: monospace;
            font-size: 11px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .ping-dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .open-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #ff99cc, #c084fc);
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .open-btn:active {
            transform: scale(0.97);
        }

        /* Спонсор */
        .sponsor-card {
            margin-top: 20px;
            padding: 14px;
            background: linear-gradient(135deg, rgba(255, 153, 204, 0.2), rgba(192, 132, 252, 0.2));
            border-radius: 28px;
            border: 1px solid rgba(255, 180, 200, 0.5);
            cursor: pointer;
            transition: all 0.3s;
        }

        .sponsor-card:active {
            transform: scale(0.98);
        }

        .sponsor-title {
            font-size: 14px;
            font-weight: 700;
            color: #ffb7c5;
            margin-bottom: 6px;
        }

        .sponsor-text {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
        }

        .quote-box {
            margin-top: 18px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            transition: all 0.5s;
        }

        .quote-text {
            font-size: 11px;
            font-style: italic;
            color: #ffb7c5;
        }

        .quote-author {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 5px;
        }

        .footer {
            margin-top: 16px;
            font-size: 9px;
            color: rgba(255, 255, 255, 0.3);
        }

        .letter {
            display: inline-block;
            opacity: 0;
            animation: fadeInLetter 0.05s forwards;
        }

        @keyframes fadeInLetter {
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- Звёзды -->
    <div id="stars"></div>

    <!-- Чайки -->
    <div class="seagull" style="top: 8%; animation-duration: 14s;">🕊️</div>
    <div class="seagull" style="top: 25%; animation-duration: 11s; animation-delay: 2s;">🕊️</div>
    <div class="seagull" style="top: 45%; animation-duration: 13s; animation-delay: 1s;">🕊️</div>
    <div class="seagull" style="top: 65%; animation-duration: 16s; animation-delay: 3s;">🕊️</div>
    <div class="seagull" style="top: 82%; animation-duration: 10s; animation-delay: 0.5s;">🕊️</div>
    <div class="seagull" style="top: 15%; animation-duration: 12s; animation-delay: 4s;">🕊️</div>
    <div class="seagull" style="top: 55%; animation-duration: 15s; animation-delay: 2.2s;">🕊️</div>

    <!-- Рыбки -->
    <div class="fish" style="top: 70%; animation-duration: 9s; animation-delay: 1s;">🐟</div>
    <div class="fish" style="top: 85%; animation-duration: 11s; animation-delay: 3s;">🐠</div>
    <div class="fish" style="top: 60%; animation-duration: 7s; animation-delay: 0s;">🐡</div>

    <!-- Аниме-персонажи -->
    <div class="character chika">💖</div>
    <div class="character nezuko">🌸</div>
    <div class="character totoro">🍃</div>
    <div class="character zenitsu">⚡</div>
    <div class="character pikachu">⚡</div>
    <div class="character jellyfish">🪼</div>
    <div class="character butterfly">🦋</div>

    <div class="container">
        <div class="card">
            <div class="anime-icon">
                🕊️✨
            </div>
            <h1 id="title">Seagull VPN</h1>
            <div class="sub" id="subText">Обход блокировок Telegram</div>

            <div class="status-area">
                <div class="status-row">
                    <span class="status-label">🌐 Сервер</span>
                    <span class="status-value" id="serverText">185.239.239.167</span>
                </div>
                <div class="status-row">
                    <span class="status-label">🔌 Порт</span>
                    <span class="status-value">443</span>
                </div>
                <div class="status-row">
                    <span class="status-label">🔐 Шифрование</span>
                    <span class="status-value">MTProto 2.0</span>
                </div>
                <div class="status-row">
                    <span class="status-label">📡 Статус</span>
                    <span class="status-value">
                        <span class="ping-dot"></span>
                        <span id="statusText">Готов</span>
                    </span>
                </div>
            </div>

            <button class="open-btn" id="openBtn">
                🕊️ ОТКРЫТЬ
            </button>

            <!-- Карточка спонсора -->
            <div class="sponsor-card" id="sponsorCard">
                <div class="sponsor-title">⭐ SPONSOR ⭐</div>
                <div class="sponsor-text">📱 <b>Seagull Proxy</b> раздаёт прокси!</div>
                <div class="sponsor-text" style="font-size: 10px;">🔗 @seagull_proxy</div>
            </div>

            <div class="quote-box" id="quoteBox">
                <div class="quote-text" id="quoteText">「 君の名は... 」</div>
                <div class="quote-author" id="quoteAuthor">— 君の名は。</div>
            </div>

            <div class="footer">
                Нажми "ОТКРЫТЬ" → Telegram разблокирован ✨
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Прокси
        const PROXY = {
            server: "185.239.239.167",
            port: "443",
            secret: "eeaaf0d30441bab41f60acae779df0c"
        };
        const PROXY_LINK = `https://t.me/proxy?server=${PROXY.server}&port=${PROXY.port}&secret=${PROXY.secret}`;

        // Аниме-цитаты
        const quotes = [
            { text: "「 君の名は... 」", author: "— 君の名は。" },
            { text: "「 大丈夫、きっと会える 」", author: "— 天気の子" },
            { text: "「 僕は君に会いに行く 」", author: "— 秒速5センチメートル" },
            { text: "「 心が叫びたがってる 」", author: "— ヴァイオレット・エヴァーガーデン" },
            { text: "「 一緒に飛ぼう 」", author: "— リズと青い鳥" }
        ];
        let currentQuoteIndex = 0;

        // Анимация букв
        function animateText(element, text, delay = 0.04) {
            element.innerHTML = '';
            text.split('').forEach((letter, i) => {
                const span = document.createElement('span');
                span.className = 'letter';
                span.textContent = letter;
                span.style.animationDelay = `${i * delay}s`;
                element.appendChild(span);
            });
        }

        // Смена цитаты
        function changeQuote() {
            const quoteBox = document.getElementById('quoteBox');
            const quoteText = document.getElementById('quoteText');
            const quoteAuthor = document.getElementById('quoteAuthor');
            quoteBox.style.opacity = '0';
            setTimeout(() => {
                currentQuoteIndex = (currentQuoteIndex + 1) % quotes.length;
                quoteText.textContent = quotes[currentQuoteIndex].text;
                quoteAuthor.textContent = quotes[currentQuoteIndex].author;
                quoteBox.style.opacity = '1';
            }, 300);
        }

        // Подключение
        function connectProxy() {
            const btn = document.getElementById('openBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '🕊️ 繋いでる...';
            btn.disabled = true;
            setTimeout(() => {
                tg.openTelegramLink(PROXY_LINK);
                document.getElementById('statusText').textContent = '接続完了';
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }, 2000);
                tg.showPopup({
                    title: "🕊️ Seagull VPN",
                    message: "Подтвердите подключение!\nТеперь Telegram без блокировок ✨",
                    buttons: [{ type: "ok", text: "🌸 わかった" }]
                });
            }, 500);
        }

        // Спонсор
        function openSponsor() {
            tg.openTelegramLink("https://t.me/seagull_proxy");
        }

        // Звёзды
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.width = Math.random() * 3 + 1 + 'px';
            star.style.height = star.style.width;
            star.style.animationDelay = Math.random() * 3 + 's';
            star.style.animationDuration = Math.random() * 2 + 1 + 's';
            document.getElementById('stars').appendChild(star);
        }

        // Запуск
        animateText(document.getElementById('title'), 'Seagull VPN', 0.045);
        setTimeout(() => {
            animateText(document.getElementById('subText'), 'Обход блокировок Telegram', 0.03);
        }, 600);
        setInterval(changeQuote, 6000);
        document.getElementById('openBtn').addEventListener('click', connectProxy);
        document.getElementById('sponsorCard').addEventListener('click', openSponsor);
    </script>
</body>
</html>
