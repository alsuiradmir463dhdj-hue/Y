<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>Proxy VPN</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 380px;
            width: 100%;
        }

        .card {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 40px;
            padding: 40px 28px;
            text-align: center;
        }

        .vpn-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #2ea6ff, #5e9eff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 48px;
            box-shadow: 0 15px 35px rgba(46, 166, 255, 0.3);
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .desc {
            color: var(--tg-theme-hint-color);
            font-size: 14px;
            margin-bottom: 28px;
        }

        .proxy-card {
            background: rgba(46, 166, 255, 0.12);
            border-radius: 24px;
            padding: 18px;
            margin: 20px 0;
            border: 1px solid rgba(46, 166, 255, 0.25);
        }

        .proxy-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
        }

        .proxy-label {
            font-size: 13px;
            color: var(--tg-theme-hint-color);
        }

        .proxy-value {
            font-family: monospace;
            font-size: 12px;
            font-weight: 500;
        }

        .status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 16px 0;
            padding: 10px;
            background: rgba(34, 197, 94, 0.15);
            border-radius: 40px;
            color: #22c55e;
            font-size: 13px;
            font-weight: 500;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        .connect-btn {
            width: 100%;
            padding: 18px;
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 16px;
        }

        .connect-btn:active {
            transform: scale(0.97);
        }

        .footer {
            margin-top: 24px;
            font-size: 11px;
            color: var(--tg-theme-hint-color);
        }

        .shield {
            margin-top: 20px;
            font-size: 12px;
            color: #2ea6ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="vpn-icon">
                🛡️
            </div>
            <h1>VPN Proxy</h1>
            <div class="desc">Обход блокировок Telegram</div>

            <div class="status">
                <span class="status-dot"></span>
                Сервер активен • Готов к подключению
            </div>

            <div class="proxy-card">
                <div class="proxy-row">
                    <span class="proxy-label">🌐 Сервер</span>
                    <span class="proxy-value">4.180.183.240</span>
                </div>
                <div class="proxy-row">
                    <span class="proxy-label">🔌 Порт</span>
                    <span class="proxy-value">443</span>
                </div>
                <div class="proxy-row">
                    <span class="proxy-label">🔐 Шифрование</span>
                    <span class="proxy-value">MTProto 2.0</span>
                </div>
            </div>

            <button class="connect-btn" id="connectBtn">
                🔓 ВКЛЮЧИТЬ ОБХОД
            </button>

            <div class="shield">
                ⚡ После подключения весь Telegram работает без блокировок
            </div>

            <div class="footer">
                Нажмите кнопку → подтвердите подключение → Telegram разблокирован
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // ВАШ ПРОКСИ (из Codespace)
        const PROXY_LINK = "https://t.me/proxy?server=4.180.183.240&port=443&secret=759773b1a20c258fbc4dde470bc0460e";

        document.getElementById('connectBtn').addEventListener('click', () => {
            // Открываем окно подключения прокси
            tg.openTelegramLink(PROXY_LINK);
            
            // Показываем подсказку
            tg.showPopup({
                title: "🛡️ Обход активирован",
                message: "Подтвердите подключение в окне Telegram.\nПосле этого весь Telegram будет работать без блокировок!",
                buttons: [{ type: "ok", text: "Понятно" }]
            });
        });
    </script>
</body>
</html>
