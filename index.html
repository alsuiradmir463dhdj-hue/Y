<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>Мой прокси • Только для меня</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0a0a2a 0%, #1a1a3e 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 380px;
            width: 100%;
        }
        .card {
            background: rgba(30,27,58,0.85);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 32px 24px;
            text-align: center;
            border: 1px solid rgba(255,180,200,0.4);
        }
        h1 {
            font-size: 26px;
            background: linear-gradient(135deg, #ff99cc, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 24px;
        }
        .lock-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 14px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,180,200,0.3);
            border-radius: 30px;
            color: white;
            font-size: 16px;
            margin-bottom: 12px;
            text-align: center;
        }
        input:focus {
            outline: none;
            border-color: #ff99cc;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff99cc, #c084fc);
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 12px;
        }
        .admin-panel {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        .admin-title {
            font-size: 14px;
            color: #ffd700;
            margin-bottom: 12px;
        }
        .proxy-link {
            font-family: monospace;
            font-size: 10px;
            word-break: break-all;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 16px;
            margin-top: 12px;
        }
        .hidden {
            display: none;
        }
        .status {
            font-size: 12px;
            color: #22c55e;
            margin-top: 12px;
        }
        .note {
            font-size: 10px;
            color: rgba(255,255,255,0.4);
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="lock-icon">🔒</div>
            <h1>Мой прокси</h1>
            
            <div id="loginPanel">
                <input type="password" id="passwordInput" placeholder="Введите пароль">
                <button id="loginBtn">ВОЙТИ</button>
                <div class="note">Только владелец имеет доступ</div>
            </div>

            <div id="adminPanel" class="hidden">
                <div class="admin-title">⚙️ УПРАВЛЕНИЕ ПРОКСИ</div>
                
                <input type="text" id="serverInput" placeholder="Сервер (IP)">
                <input type="text" id="portInput" placeholder="Порт" value="443">
                <input type="text" id="secretInput" placeholder="Секрет (ключ)">
                
                <button id="saveBtn">💾 СОХРАНИТЬ НАСТРОЙКИ</button>
                <button id="activateBtn" style="background: #22c55e;">🔌 АКТИВИРОВАТЬ ПРОКСИ</button>
                
                <div id="proxyLinkDisplay" class="proxy-link"></div>
                <div id="statusDisplay" class="status"></div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // ========== ТВОЙ ПАРОЛЬ (только ты знаешь) ==========
        const OWNER_PASSWORD = "мойсекрет2024";  // 🔥 ЗАМЕНИ НА СВОЙ ПАРОЛЬ!
        
        // ========== ТВОИ ДАННЫЕ ПО УМОЛЧАНИЮ ==========
        let proxyConfig = {
            server: "185.239.239.167",
            port: "443",
            secret: "eeaaf0d30441bab41f60acae779df0c"
        };

        // Загрузка сохранённых настроек
        function loadConfig() {
            const saved = localStorage.getItem('my_proxy_config');
            if (saved) {
                try {
                    proxyConfig = JSON.parse(saved);
                    document.getElementById('serverInput').value = proxyConfig.server;
                    document.getElementById('portInput').value = proxyConfig.port;
                    document.getElementById('secretInput').value = proxyConfig.secret;
                } catch(e) {}
            }
        }

        function saveConfig() {
            proxyConfig = {
                server: document.getElementById('serverInput').value,
                port: document.getElementById('portInput').value,
                secret: document.getElementById('secretInput').value
            };
            localStorage.setItem('my_proxy_config', JSON.stringify(proxyConfig));
            document.getElementById('statusDisplay').textContent = '✅ Настройки сохранены!';
            updateProxyLink();
            setTimeout(() => {
                document.getElementById('statusDisplay').textContent = '';
            }, 2000);
        }

        function updateProxyLink() {
            const link = `https://t.me/proxy?server=${proxyConfig.server}&port=${proxyConfig.port}&secret=${proxyConfig.secret}`;
            document.getElementById('proxyLinkDisplay').innerHTML = `🔗 <a href="${link}" style="color:#00ccff;">${link}</a>`;
        }

        function activateProxy() {
            const link = `https://t.me/proxy?server=${proxyConfig.server}&port=${proxyConfig.port}&secret=${proxyConfig.secret}`;
            tg.openTelegramLink(link);
            document.getElementById('statusDisplay').textContent = '🔌 Подключение...';
            setTimeout(() => {
                document.getElementById('statusDisplay').textContent = '✅ Прокси активирован!';
            }, 1500);
        }

        function login() {
            const password = document.getElementById('passwordInput').value;
            if (password === OWNER_PASSWORD) {
                document.getElementById('loginPanel').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                loadConfig();
                updateProxyLink();
                tg.showPopup({
                    title: "🔓 Доступ открыт",
                    message: "Теперь ты управляешь прокси!\nМожешь менять сервер, порт, секрет.",
                    buttons: [{ type: "ok", text: "Понятно" }]
                });
            } else {
                tg.showPopup({
                    title: "❌ Ошибка",
                    message: "Неверный пароль! Доступ запрещён.",
                    buttons: [{ type: "ok", text: "Ок" }]
                });
                document.getElementById('passwordInput').value = '';
            }
        }

        document.getElementById('loginBtn').addEventListener('click', login);
        document.getElementById('saveBtn').addEventListener('click', saveConfig);
        document.getElementById('activateBtn').addEventListener('click', activateProxy);
        
        // Enter для входа
        document.getElementById('passwordInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
