<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>Seagull VPN</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1e1b4b 0%, #0c0a2a 100%);
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Чайки */
        .seagull {
            position: absolute;
            font-size: 28px;
            pointer-events: none;
            z-index: 10;
            animation: fly 8s linear infinite;
        }

        @keyframes fly {
            0% {
                transform: translateX(-10vw) translateY(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateX(110vw) translateY(-30px) rotate(5deg);
                opacity: 0;
            }
        }

        .seagull:nth-child(1) { top: 10%; animation-duration: 12s; animation-delay: 0s; }
        .seagull:nth-child(2) { top: 25%; animation-duration: 10s; animation-delay: 2s; }
        .seagull:nth-child(3) { top: 45%; animation-duration: 14s; animation-delay: 1s; }
        .seagull:nth-child(4) { top: 65%; animation-duration: 11s; animation-delay: 3s; }
        .seagull:nth-child(5) { top: 80%; animation-duration: 13s; animation-delay: 0.5s; }
        .seagull:nth-child(6) { top: 15%; animation-duration: 9s; animation-delay: 4s; }
        .seagull:nth-child(7) { top: 55%; animation-duration: 15s; animation-delay: 2.5s; }

        .container {
            max-width: 380px;
            width: 100%;
            z-index: 20;
            position: relative;
        }

        .card {
            background: rgba(30, 27, 75, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 32px 24px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
        }

        .anime-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #f472b6, #c084fc);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 52px;
            animation: float 3s ease-in-out infinite;
            box-shadow: 0 10px 30px rgba(192, 132, 252, 0.3);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #f472b6, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .sub {
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            margin-bottom: 24px;
        }

        /* Статус */
        .status-area {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            padding: 20px;
            margin: 20px 0;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status-row:last-child {
            border-bottom: none;
        }

        .status-label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
        }

        .status-value {
            font-family: monospace;
            font-size: 12px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .ping-dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Кнопка открытия */
        .open-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #f472b6, #c084fc);
            border: none;
            border-radius: 60px;
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .open-btn:active {
            transform: scale(0.97);
        }

        /* Аниме цитата */
        .quote {
            margin-top: 20px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            font-style: italic;
        }

        .footer {
            margin-top: 20px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.3);
        }

        /* Анимация появления букв */
        .letter {
            display: inline-block;
            opacity: 0;
            animation: fadeInLetter 0.05s forwards;
        }

        @keyframes fadeInLetter {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <!-- Чайки -->
    <div class="seagull">🕊️</div>
    <div class="seagull">🕊️</div>
    <div class="seagull">🕊️</div>
    <div class="seagull">🕊️</div>
    <div class="seagull">🕊️</div>
    <div class="seagull">🕊️</div>
    <div class="seagull">🕊️</div>

    <div class="container">
        <div class="card">
            <div class="anime-icon">
                🕊️
            </div>
            <h1 id="title">Seagull VPN</h1>
            <div class="sub" id="subText">Обход блокировок Telegram</div>

            <div class="status-area">
                <div class="status-row">
                    <span class="status-label">🌐 Сервер</span>
                    <span class="status-value" id="serverText">185.239.239.167</span>
                </div>
                <div class="status-row">
                    <span class="status-label">🔌 Порт</span>
                    <span class="status-value">443</span>
                </div>
                <div class="status-row">
                    <span class="status-label">🔐 Шифрование</span>
                    <span class="status-value">MTProto 2.0</span>
                </div>
                <div class="status-row">
                    <span class="status-label">📡 Статус</span>
                    <span class="status-value">
                        <span class="ping-dot"></span>
                        <span id="statusText">Готов</span>
                    </span>
                </div>
            </div>

            <button class="open-btn" id="openBtn">
                🕊️ ОТКРЫТЬ
            </button>

            <div class="quote" id="quote">
                「 繋がる世界 」
            </div>
            <div class="footer">
                Нажми "ОТКРЫТЬ" → подключись → Telegram разблокирован
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Рабочие прокси
        const PROXY = {
            server: "185.239.239.167",
            port: "443",
            secret: "eeaaf0d30441bab41f60acae779df0c"
        };

        const PROXY_LINK = `https://t.me/proxy?server=${PROXY.server}&port=${PROXY.port}&secret=${PROXY.secret}`;

        // Анимация появления букв в заголовке
        function animateText(element, text, delay = 0.03) {
            element.innerHTML = '';
            const letters = text.split('');
            letters.forEach((letter, i) => {
                const span = document.createElement('span');
                span.className = 'letter';
                span.textContent = letter;
                span.style.animationDelay = `${i * delay}s`;
                element.appendChild(span);
            });
        }

        // Анимация при открытии
        function animateOpen() {
            const btn = document.getElementById('openBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '🕊️ ПОДКЛЮЧЕНИЕ...';
            btn.disabled = true;

            setTimeout(() => {
                tg.openTelegramLink(PROXY_LINK);
                
                document.getElementById('statusText').textContent = 'Подключено!';
                document.getElementById('quote').innerHTML = '「 もう大丈夫、繋がったよ 」';
                
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }, 2000);
                
                tg.showPopup({
                    title: "🕊️ Seagull VPN",
                    message: "Подтвердите подключение в окне Telegram!\nТеперь Telegram работает без блокировок ✨",
                    buttons: [{ type: "ok", text: "🌸 Понятно" }]
                });
            }, 500);
        }

        // Анимация появления при загрузке
        animateText(document.getElementById('title'), 'Seagull VPN', 0.03);
        
        setTimeout(() => {
            animateText(document.getElementById('subText'), 'Обход блокировок Telegram', 0.02);
        }, 500);

        document.getElementById('openBtn').addEventListener('click', animateOpen);
    </script>
</body>
</html>
