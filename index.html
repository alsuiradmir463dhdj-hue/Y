<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>Seagull VPN • Аниме прокси</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0c29 100%);
            font-family: 'Segoe UI', 'Poppins', 'Noto Sans', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Летающие чайки */
        .seagull {
            position: absolute;
            font-size: 32px;
            pointer-events: none;
            z-index: 10;
            animation: fly 12s linear infinite;
            filter: drop-shadow(0 0 8px rgba(255,200,200,0.6));
        }

        @keyframes fly {
            0% {
                transform: translateX(-10vw) translateY(0) rotate(-10deg);
                opacity: 0;
            }
            20% {
                opacity: 1;
            }
            80% {
                opacity: 1;
            }
            100% {
                transform: translateX(110vw) translateY(-50px) rotate(10deg);
                opacity: 0;
            }
        }

        .seagull:nth-child(1) { top: 8%; animation-duration: 15s; animation-delay: 0s; }
        .seagull:nth-child(2) { top: 22%; animation-duration: 11s; animation-delay: 2s; }
        .seagull:nth-child(3) { top: 40%; animation-duration: 13s; animation-delay: 1s; }
        .seagull:nth-child(4) { top: 58%; animation-duration: 17s; animation-delay: 3s; }
        .seagull:nth-child(5) { top: 75%; animation-duration: 10s; animation-delay: 0.5s; }
        .seagull:nth-child(6) { top: 12%; animation-duration: 14s; animation-delay: 4s; }
        .seagull:nth-child(7) { top: 48%; animation-duration: 16s; animation-delay: 2.5s; }
        .seagull:nth-child(8) { top: 85%; animation-duration: 12s; animation-delay: 1.2s; }

        .container {
            max-width: 380px;
            width: 100%;
            z-index: 20;
            position: relative;
        }

        .card {
            background: rgba(30, 33, 58, 0.75);
            backdrop-filter: blur(20px);
            border-radius: 56px;
            padding: 32px 24px;
            text-align: center;
            border: 1px solid rgba(255, 180, 200, 0.3);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4);
        }

        .anime-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #ff99cc, #c084fc, #a855f7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 52px;
            animation: float 3s ease-in-out infinite, glow 2s infinite;
            box-shadow: 0 10px 30px rgba(192, 132, 252, 0.5);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 10px rgba(255, 153, 204, 0.5); }
            50% { box-shadow: 0 0 25px rgba(192, 132, 252, 0.9); }
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff99cc, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .sub {
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            margin-bottom: 24px;
        }

        /* Статус */
        .status-area {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            padding: 20px;
            margin: 20px 0;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status-row:last-child {
            border-bottom: none;
        }

        .status-label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
        }

        .status-value {
            font-family: monospace;
            font-size: 12px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .ping-dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Кнопка */
        .open-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #ff99cc, #c084fc);
            border: none;
            border-radius: 60px;
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .open-btn:active {
            transform: scale(0.97);
        }

        /* Аниме-цитата */
        .quote-box {
            margin-top: 24px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 28px;
            transition: all 0.5s;
        }

        .quote-text {
            font-size: 13px;
            font-style: italic;
            color: #ffb7c5;
            line-height: 1.5;
        }

        .quote-author {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 8px;
            letter-spacing: 1px;
        }

        .footer {
            margin-top: 20px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.3);
        }

        /* Анимация букв */
        .letter {
            display: inline-block;
            opacity: 0;
            animation: fadeInLetter 0.05s forwards;
        }

        @keyframes fadeInLetter {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <!-- Летающие чайки -->
    <div class="seagull">🕊️</div>
    <div class="seagull">🕊️</div>
    <div class="seagull">🕊️</div>
    <div class="seagull">🕊️</div>
    <div class="seagull">🕊️</div>
    <div class="seagull">🕊️</div>
    <div class="seagull">🕊️</div>
    <div class="seagull">🕊️</div>

    <div class="container">
        <div class="card">
            <div class="anime-icon">
                🕊️✨
            </div>
            <h1 id="title">Seagull VPN</h1>
            <div class="sub" id="subText">Обход блокировок Telegram</div>

            <div class="status-area">
                <div class="status-row">
                    <span class="status-label">🌐 Сервер</span>
                    <span class="status-value" id="serverText">185.239.239.167</span>
                </div>
                <div class="status-row">
                    <span class="status-label">🔌 Порт</span>
                    <span class="status-value">443</span>
                </div>
                <div class="status-row">
                    <span class="status-label">🔐 Шифрование</span>
                    <span class="status-value">MTProto 2.0</span>
                </div>
                <div class="status-row">
                    <span class="status-label">📡 Статус</span>
                    <span class="status-value">
                        <span class="ping-dot"></span>
                        <span id="statusText">Готов</span>
                    </span>
                </div>
            </div>

            <button class="open-btn" id="openBtn">
                🕊️ ОТКРЫТЬ
            </button>

            <!-- Аниме-цитата -->
            <div class="quote-box" id="quoteBox">
                <div class="quote-text" id="quoteText">「 君の名前は... 」</div>
                <div class="quote-author" id="quoteAuthor">— 天気の子</div>
            </div>

            <div class="footer">
                Нажми "ОТКРЫТЬ" → Telegram разблокирован ✨
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Рабочий прокси
        const PROXY = {
            server: "185.239.239.167",
            port: "443",
            secret: "eeaaf0d30441bab41f60acae779df0c"
        };

        const PROXY_LINK = `https://t.me/proxy?server=${PROXY.server}&port=${PROXY.port}&secret=${PROXY.secret}`;

        // Аниме-цитаты
        const quotes = [
            { text: "「 繋がりたい、ただそれだけ 」", author: "— 君の名は。" },
            { text: "「 大丈夫、きっと繋がるから 」", author: "— 天気の子" },
            { text: "「 僕はここにいるよ 」", author: "— 秒速5センチメートル" },
            { text: "「 たとえ世界が変わっても 」", author: "— ヴァイオレット・エヴァーガーデン" },
            { text: "「 もう一度、会いたい 」", author: "— 天気の子" },
            { text: "「 君を待ってる 」", author: "— ハルヒ" },
            { text: "「 どこにいても、繋がってる 」", author: "— シュタインズ・ゲート" },
            { text: "「 一緒に飛ぼう 」", author: "— リズと青い鳥" },
            { text: "「 海を越えて、君のもとへ 」", author: "— 海獣の子供" },
            { text: "「 風が吹いたら、会いに行く 」", author: "— 風の谷のナウシカ" }
        ];

        let currentQuoteIndex = 0;

        // Анимация смены цитаты
        function changeQuote() {
            const quoteBox = document.getElementById('quoteBox');
            const quoteText = document.getElementById('quoteText');
            const quoteAuthor = document.getElementById('quoteAuthor');
            
            quoteBox.style.opacity = '0';
            
            setTimeout(() => {
                currentQuoteIndex = (currentQuoteIndex + 1) % quotes.length;
                quoteText.textContent = quotes[currentQuoteIndex].text;
                quoteAuthor.textContent = quotes[currentQuoteIndex].author;
                quoteBox.style.opacity = '1';
            }, 300);
        }

        // Анимация появления букв
        function animateText(element, text, delay = 0.03) {
            element.innerHTML = '';
            const letters = text.split('');
            letters.forEach((letter, i) => {
                const span = document.createElement('span');
                span.className = 'letter';
                span.textContent = letter;
                span.style.animationDelay = `${i * delay}s`;
                element.appendChild(span);
            });
        }

        // Подключение
        function connectProxy() {
            const btn = document.getElementById('openBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '🕊️ 繋いでる...';
            btn.disabled = true;

            setTimeout(() => {
                tg.openTelegramLink(PROXY_LINK);
                
                document.getElementById('statusText').textContent = '接続完了';
                document.getElementById('quoteText').innerHTML = '「 繋がったよ、ありがとう 」';
                document.getElementById('quoteAuthor').innerHTML = '— Seagull VPN';
                
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }, 2000);
                
                tg.showPopup({
                    title: "🕊️ Seagull VPN",
                    message: "Подтвердите подключение!\nТеперь Telegram без блокировок ✨",
                    buttons: [{ type: "ok", text: "🌸 わかった" }]
                });
            }, 500);
        }

        // Запуск анимаций
        animateText(document.getElementById('title'), 'Seagull VPN', 0.04);
        
        setTimeout(() => {
            animateText(document.getElementById('subText'), 'Обход блокировок Telegram', 0.025);
        }, 600);

        // Смена цитаты каждые 6 секунд
        setInterval(changeQuote, 6000);

        document.getElementById('openBtn').addEventListener('click', connectProxy);
    </script>
</body>
</html>
